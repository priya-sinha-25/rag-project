name: Scheduled Data Refresh

on:
  schedule:
    # Run at 10:00 AM IST (04:30 UTC) every day
    - cron: '30 4 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub UI

jobs:
  refresh-corpus:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ingestion Pipeline
        env:
          PYTHONPATH: src
          # Assuming you need GROQ_API_KEY if the orchestrator is ever called during tests
          # GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -m mf_faq.ingestion.refresh

      - name: Upload Index Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: index-data
          path: |
            data/index/
            data/processed/
          retention-days: 7
